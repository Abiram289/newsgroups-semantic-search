<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsgroups Semantic Search</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #12121a;
    --border:   #ffffff0f;
    --accent:   #7c6aff;
    --green:    #34d399;
    --red:      #f87171;
    --yellow:   #fbbf24;
    --text:     #e2e2f0;
    --muted:    #6b6b80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* ── HEADER ── */
  header {
    max-width: 860px;
    margin: 0 auto 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  header p { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  #server-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  #status-dot.online  { background: var(--green); box-shadow: 0 0 8px var(--green); }
  #status-dot.offline { background: var(--red); }

  /* ── MAIN LAYOUT ── */
  main { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* ── SEARCH BOX ── */
  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .search-row { display: flex; gap: 10px; }
  #query-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  #query-input:focus { border-color: var(--accent); }
  #query-input::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover  { opacity: 0.85; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    padding: 10px 18px;
  }
  button.danger {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 13px;
    padding: 10px 18px;
  }
  button.danger:hover { background: var(--red); color: #fff; }

  .options-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .option-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .option-group input[type=number], .option-group input[type=range] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 60px;
    outline: none;
  }
  #threshold-val { color: var(--accent); font-weight: 700; min-width: 32px; display: inline-block; }

  /* ── QUICK QUERIES ── */
  .quick-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
  .quick-queries { display: flex; flex-wrap: wrap; gap: 8px; }
  .quick-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 14px;
    font-weight: 400;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; transform: none; }

  /* ── STATS BAR ── */
  #stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 24px; font-weight: 800; }
  .stat-value.green  { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.red    { color: var(--red); }

  /* ── RESPONSE CARD ── */
  #response-area { display: flex; flex-direction: column; gap: 12px; }

  .response-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: slideIn 0.3s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .card-query { font-weight: 700; font-size: 15px; flex: 1; }
  .cache-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cache-badge.hit  { background: var(--green)22; color: var(--green); border: 1px solid var(--green)44; }
  .cache-badge.miss { background: var(--red)22;   color: var(--red);   border: 1px solid var(--red)44; }
  .time-badge {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  .card-meta {
    padding: 12px 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-key  { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .meta-val  { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--text); }
  .meta-val.accent { color: var(--accent); }
  .meta-val.green  { color: var(--green); }
  .meta-val.yellow { color: var(--yellow); }

  /* ── CLUSTER BAR ── */
  .cluster-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .cluster-label-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .cluster-bars { display: flex; gap: 3px; align-items: flex-end; height: 40px; }
  .cluster-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .cluster-bar {
    width: 100%;
    border-radius: 2px 2px 0 0;
    transition: height 0.5s cubic-bezier(.16,1,.3,1);
    min-height: 2px;
    background: var(--accent)55;
  }
  .cluster-bar.dominant { background: var(--accent); }
  .cluster-bar-id { font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* ── RESULTS ── */
  .results-section { padding: 16px 20px; }
  .results-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .result-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .result-item:hover { border-color: var(--accent)55; }
  .result-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .result-category {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 700;
  }
  .result-score {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
  }
  .result-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .result-item.expanded .result-text {
    -webkit-line-clamp: unset;
    display: block;
  }

  /* ── HISTORY ── */
  #history-area { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
    font-size: 13px;
  }
  .history-item:hover { border-color: var(--accent)55; }
  .history-query { flex: 1; color: var(--text); }
  .history-time  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

  /* ── SECTION HEADERS ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── LOADER ── */
  .loader {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    border: 1px solid transparent;
    color: var(--muted);
    background: transparent;
    transition: all 0.2s;
  }
  .tab:hover  { color: var(--text); transform: none; }
  .tab.active { background: var(--surface); border-color: var(--border); color: var(--text); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  @media (max-width: 600px) {
    #stats-bar { grid-template-columns: repeat(2, 1fr); }
    .card-meta { gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Newsgroups <span>Semantic Search</span></h1>
    <p style="margin-top:4px">20 Newsgroups · Fuzzy Clustering · Semantic Cache</p>
  </div>
  <div id="server-status">
    <div id="status-dot"></div>
    <span id="status-text">checking...</span>
  </div>
</header>

<main>

  <!-- SEARCH BOX -->
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="query-input" placeholder="Ask anything about the newsgroups corpus..." autocomplete="off" />
      <button id="search-btn" onclick="runQuery()">Search</button>
    </div>

    <div class="options-row">
      <div class="option-group">
        <span>top_k</span>
        <input type="number" id="top-k" value="5" min="1" max="20" />
      </div>
      <div class="option-group">
        <span>threshold</span>
        <input type="range" id="threshold" min="0.5" max="1.0" step="0.01" value="0.85"
               oninput="document.getElementById('threshold-val').textContent = parseFloat(this.value).toFixed(2)" />
        <span id="threshold-val">0.85</span>
      </div>
    </div>

    <div>
      <div class="quick-label" style="margin-bottom:8px">Quick queries</div>
      <div class="quick-queries">
        <button class="quick-btn" onclick="setQuery('what is nasa and space exploration')">🚀 nasa & space</button>
        <button class="quick-btn" onclick="setQuery('tell me about the space program')">🛸 space program</button>
        <button class="quick-btn" onclick="setQuery('gun control legislation debate')">⚖️ gun control</button>
        <button class="quick-btn" onclick="setQuery('firearms and second amendment rights')">🔫 second amendment</button>
        <button class="quick-btn" onclick="setQuery('windows operating system problems')">💻 windows OS</button>
        <button class="quick-btn" onclick="setQuery('christian religion and god')">✝️ religion</button>
        <button class="quick-btn" onclick="setQuery('baseball season scores')">⚾ baseball</button>
        <button class="quick-btn" onclick="setQuery('car engine repair and maintenance')">🚗 cars</button>
      </div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div id="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Entries</div>
      <div class="stat-value accent" id="stat-entries">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cache Hits</div>
      <div class="stat-value green" id="stat-hits">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cache Misses</div>
      <div class="stat-value red" id="stat-misses">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hit Rate</div>
      <div class="stat-value yellow" id="stat-hitrate">—</div>
    </div>
  </div>

  <!-- TABS -->
  <div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('results', this)">Results</button>
      <button class="tab" onclick="switchTab('history', this)">History</button>
    </div>

    <!-- RESULTS TAB -->
    <div id="tab-results" class="tab-content active">
      <div id="response-area">
        <div class="empty-state">
          <div class="icon">🔍</div>
          Run a query to see results here
        </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab-content">
      <div class="section-header">
        <span class="section-title">Query History</span>
        <button class="secondary" onclick="clearHistory()">Clear</button>
      </div>
      <div id="history-area">
        <div class="empty-state">
          <div class="icon">📋</div>
          No queries yet
        </div>
      </div>
    </div>
  </div>

  <!-- CACHE CONTROLS -->
  <div style="display:flex; justify-content:flex-end; gap:10px;">
    <button class="secondary" onclick="fetchStats()">↻ Refresh Stats</button>
    <button class="danger" onclick="flushCache()">🗑 Flush Cache</button>
  </div>

</main>

<script>
// ── STATE ──────────────────────────────────────────────────────
const history = [];

// ── SERVER STATUS CHECK ────────────────────────────────────────
async function checkServer() {
  try {
    const res = await fetch(`${API_BASE}/health`);
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (res.ok) {
      dot.className  = 'online';
      const data     = await res.json();
      text.textContent = `online · ${data.vector_store_docs.toLocaleString()} docs`;
    } else {
      dot.className  = 'offline';
      text.textContent = 'server error';
    }
  } catch {
    document.getElementById('status-dot').className = 'offline';
    document.getElementById('status-text').textContent = 'offline — start uvicorn';
  }
}

// API base — change if your server runs elsewhere
const API_BASE = 'http://localhost:8000';

// ── FETCH STATS ────────────────────────────────────────────────
async function fetchStats() {
  try {
    const res  = await fetch(`${API_BASE}/cache/stats`);
    const data = await res.json();
    document.getElementById('stat-entries').textContent = data.total_entries;
    document.getElementById('stat-hits').textContent    = data.hit_count;
    document.getElementById('stat-misses').textContent  = data.miss_count;
    document.getElementById('stat-hitrate').textContent =
      data.total_entries === 0 ? '—' : (data.hit_rate * 100).toFixed(1) + '%';
  } catch {
    ['stat-entries','stat-hits','stat-misses','stat-hitrate']
      .forEach(id => document.getElementById(id).textContent = '—');
  }
}

// ── RUN QUERY ──────────────────────────────────────────────────
async function runQuery() {
  const query     = document.getElementById('query-input').value.trim();
  const topK      = parseInt(document.getElementById('top-k').value) || 5;
  const threshold = parseFloat(document.getElementById('threshold').value);

  if (!query) return;

  const btn = document.getElementById('search-btn');
  btn.disabled   = true;
  btn.innerHTML  = '<span class="loader"></span>Searching...';

  // Switch to results tab
  switchTab('results', document.querySelector('.tab'));

  try {
    const res  = await fetch(`${API_BASE}/query`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ query, top_k: topK, threshold }),
    });
    const data = await res.json();

    renderResponse(data);
    addToHistory(data);
    fetchStats();
  } catch (e) {
    document.getElementById('response-area').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        Could not reach server at ${API_BASE}<br>Make sure uvicorn is running
      </div>`;
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'Search';
  }
}

// ── RENDER RESPONSE ────────────────────────────────────────────
function renderResponse(data) {
  const area = document.getElementById('response-area');

  const isHit      = data.cache_hit;
  const memberships = data.cluster_memberships || [];
  const dominant   = data.dominant_cluster;
  const maxM       = Math.max(...memberships);

  // Parse results text into individual result items
  const results = (data.result || '').split('\n\n---\n\n').map(r => {
    const catMatch   = r.match(/Category:\s*([^\s(]+)/);
    const scoreMatch = r.match(/similarity:\s*([\d.]+)/);
    const textStart  = r.indexOf('\n');
    return {
      category: catMatch  ? catMatch[1]  : 'unknown',
      score:    scoreMatch ? scoreMatch[1] : '?',
      text:     textStart >= 0 ? r.slice(textStart + 1).trim() : r,
    };
  });

  const clusterBars = memberships.map((m, i) => `
    <div class="cluster-bar-wrap">
      <div class="cluster-bar ${i === dominant ? 'dominant' : ''}"
           style="height:${Math.max(4, (m / maxM) * 36)}px"
           title="Cluster ${i}: ${(m*100).toFixed(1)}%"></div>
      <div class="cluster-bar-id">${i}</div>
    </div>
  `).join('');

  const resultItems = results.map((r, i) => `
    <div class="result-item" onclick="this.classList.toggle('expanded')">
      <div class="result-item-header">
        <span class="result-category">${r.category}</span>
        <span class="result-score">sim: ${r.score}</span>
      </div>
      <div class="result-text">${escapeHtml(r.text)}</div>
    </div>
  `).join('');

  const card = document.createElement('div');
  card.className = 'response-card';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-query">"${escapeHtml(data.query)}"</div>
      <span class="cache-badge ${isHit ? 'hit' : 'miss'}">${isHit ? '⚡ CACHE HIT' : '🔍 CACHE MISS'}</span>
      <span class="time-badge">${data.response_time_ms}ms</span>
    </div>

    <div class="card-meta">
      <div class="meta-item">
        <div class="meta-key">Dominant Cluster</div>
        <div class="meta-val accent">#${dominant}</div>
      </div>
      ${isHit ? `
      <div class="meta-item">
        <div class="meta-key">Matched Query</div>
        <div class="meta-val" style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">"${escapeHtml(data.matched_query)}"</div>
      </div>
      <div class="meta-item">
        <div class="meta-key">Similarity Score</div>
        <div class="meta-val green">${data.similarity_score}</div>
      </div>` : ''}
      <div class="meta-item">
        <div class="meta-key">Response Time</div>
        <div class="meta-val ${data.response_time_ms < 50 ? 'green' : 'yellow'}">${data.response_time_ms}ms</div>
      </div>
    </div>

    ${memberships.length ? `
    <div class="cluster-section">
      <div class="cluster-label-row">
        <span>Fuzzy Cluster Memberships</span>
        <span>dominant: cluster ${dominant} (${(memberships[dominant]*100).toFixed(1)}%)</span>
      </div>
      <div class="cluster-bars">${clusterBars}</div>
    </div>` : ''}

    <div class="results-section">
      <div class="results-label">Retrieved Documents (click to expand)</div>
      ${resultItems || '<div style="color:var(--muted);font-size:13px">No results</div>'}
    </div>
  `;

  // Prepend new result
  if (area.querySelector('.empty-state')) area.innerHTML = '';
  area.insertBefore(card, area.firstChild);
}

// ── HISTORY ────────────────────────────────────────────────────
function addToHistory(data) {
  history.unshift(data);
  renderHistory();
}

function renderHistory() {
  const area = document.getElementById('history-area');
  if (!history.length) {
    area.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No queries yet</div>';
    return;
  }
  area.innerHTML = history.map((d, i) => `
    <div class="history-item" onclick="replayQuery('${escapeHtml(d.query)}')">
      <span class="cache-badge ${d.cache_hit ? 'hit' : 'miss'}" style="flex-shrink:0">
        ${d.cache_hit ? 'HIT' : 'MISS'}
      </span>
      <span class="history-query">${escapeHtml(d.query)}</span>
      <span class="history-time">${d.response_time_ms}ms</span>
    </div>
  `).join('');
}

function clearHistory() {
  history.length = 0;
  renderHistory();
}

// ── FLUSH CACHE ────────────────────────────────────────────────
async function flushCache() {
  if (!confirm('Flush the entire cache and reset all stats?')) return;
  try {
    await fetch(`${API_BASE}/cache`, { method: 'DELETE' });
    fetchStats();
    alert('Cache flushed!');
  } catch {
    alert('Could not reach server');
  }
}

// ── HELPERS ────────────────────────────────────────────────────
function setQuery(q) {
  document.getElementById('query-input').value = q;
  document.getElementById('query-input').focus();
}

function replayQuery(q) {
  setQuery(q);
  switchTab('results', document.querySelectorAll('.tab')[0]);
  runQuery();
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

// Enter key to search
document.getElementById('query-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runQuery();
});

// ── INIT ──────────────────────────────────────────────────────
checkServer();
fetchStats();
setInterval(checkServer, 10000);
</script>
